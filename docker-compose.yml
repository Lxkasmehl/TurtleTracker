# PicTur – run frontend, auth-backend, and backend with Docker Compose
# Usage: docker compose up --build
# Then open http://localhost (frontend), Auth API on :3001, PicTur API on :5000
# Optional: set FRONTEND_PORT in .env (e.g. 8080) if port 80 is in use; then use FRONTEND_URL=http://localhost:8080 for auth.

# Pin project name so container names and `docker compose` state stay stable regardless of clone folder name.
name: turtleproject

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # URLs the browser uses (host-relative when all ports are published)
        VITE_AUTH_API_URL: ${VITE_AUTH_API_URL:-http://localhost:3001/api}
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
    ports:
      - '${FRONTEND_PORT:-80}:80'
    depends_on:
      - auth-backend
      - backend

  auth-backend:
    build:
      context: ./auth-backend
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    environment:
      PORT: 3001
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      # Optional: Google OAuth (set in .env for login with Google)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      # Public base URL of the auth API (no trailing slash). Used for Google OAuth if GOOGLE_CALLBACK_URL is unset.
      AUTH_BACKEND_URL: ${AUTH_BACKEND_URL:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-}
      # Optional SMTP (set in project root .env for Docker; same vars as auth-backend/.env locally)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
    volumes:
      - auth-data:/app/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '5000:5000'
    environment:
      PORT: 5000
      FLASK_DEBUG: 'false'
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      AUTH_URL: ${AUTH_URL:-http://auth-backend:3001/api}
      GOOGLE_SHEETS_SPREADSHEET_ID: ${GOOGLE_SHEETS_SPREADSHEET_ID:-}
      GOOGLE_SHEETS_CREDENTIALS_PATH: ${GOOGLE_SHEETS_CREDENTIALS_PATH:-/app/credentials/google-sheets-credentials.json}
      GOOGLE_SHEETS_COMMUNITY_SPREADSHEET_ID: ${GOOGLE_SHEETS_COMMUNITY_SPREADSHEET_ID:-}
      BACKUP_OUTPUT_DIR: ${BACKUP_OUTPUT_DIR:-/app/backups}
    volumes:
      - backend-data:/app/data
      # Backups on host so they survive container/volume removal (see docs/BACKUP.md)
      - ./backups:/app/backups
      # Mount Google credentials from host (create backend/credentials/ and add JSON)
      - ./backend/credentials:/app/credentials:ro
    # Backend may take a while to warm SuperPoint tensor cache
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  auth-data:
  backend-data:
