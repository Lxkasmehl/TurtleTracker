name: Backend Integration Tests

on:
  push:
    branches: [main, master, develop]
    paths: ['backend/**', 'auth-backend/**', '.github/workflows/backend-integration-tests.yml', 'docker-compose.integration.yml']
  pull_request:
    branches: [main, master, develop]
    paths: ['backend/**', 'auth-backend/**', '.github/workflows/backend-integration-tests.yml', 'docker-compose.integration.yml']

jobs:
  # Fast guardrail: production GPU image uses requirements-docker-cuda.txt only; drift causes startup import failures.
  cuda-requirements-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install packaging (PEP 508 parser)
        run: pip install packaging
      - name: Verify requirements-docker-cuda.txt matches requirements.txt (except torch/torchvision)
        run: python backend/scripts/check_requirements_cuda_sync.py

  # E2E + integration Compose use docker-compose.yml (CPU Dockerfile only). Production deploy uses
  # Dockerfile.cuda — build it here and import the full app to catch missing deps / startup import crashes.
  backend-cuda-image-smoke:
    name: Production backend image (Dockerfile.cuda) — build + import smoke
    needs: cuda-requirements-sync
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend Dockerfile.cuda (same as GPU deploy)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.cuda
          load: true
          tags: pictur-backend:cuda-ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke — full app import inside image
        run: |
          docker run --rm pictur-backend:cuda-ci \
            python3 -c "import app; print('app import ok')"

  integration:
    needs: cuda-requirements-sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env for Docker Compose
        run: |
          echo "JWT_SECRET=test-jwt-secret-key-for-integration-tests" >> .env
          echo "SESSION_SECRET=test-session-secret" >> .env

      - name: Build and start services (auth-backend + backend)
        run: docker compose -f docker-compose.integration.yml up -d --build

      - name: Wait for auth backend
        run: |
          n=0
          until [ $n -ge 60 ]; do
            if curl -sf http://localhost:3001/api/health > /dev/null; then break; fi
            n=$((n+1)); sleep 1
          done
          [ $n -lt 60 ] || (echo "Auth backend did not become ready"; exit 1)

      - name: Seed test users in auth backend
        run: |
          docker compose -f docker-compose.integration.yml exec -T \
            -e E2E_ADMIN_EMAIL=admin@test.com \
            -e E2E_ADMIN_PASSWORD=testpassword123 \
            -e E2E_STAFF_EMAIL=staff@test.com \
            -e E2E_STAFF_PASSWORD=testpassword123 \
            -e E2E_COMMUNITY_EMAIL=community@test.com \
            -e E2E_COMMUNITY_PASSWORD=testpassword123 \
            auth-backend node dist/scripts/seed-test-users.js

      - name: Wait for Flask backend
        run: |
          n=0
          until [ $n -ge 120 ]; do
            if curl -sf http://localhost:5000/api/health > /dev/null; then break; fi
            n=$((n+1)); sleep 1
          done
          [ $n -lt 120 ] || (echo "Flask backend did not become ready"; exit 1)

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: ./backend
        run: pip install -r requirements.txt

      - name: Run integration tests
        working-directory: ./backend
        env:
          BACKEND_URL: http://localhost:5000
          AUTH_URL: http://localhost:3001/api
          E2E_ADMIN_EMAIL: admin@test.com
          E2E_ADMIN_PASSWORD: testpassword123
          E2E_STAFF_EMAIL: staff@test.com
          E2E_STAFF_PASSWORD: testpassword123
          E2E_COMMUNITY_EMAIL: community@test.com
          E2E_COMMUNITY_PASSWORD: testpassword123
        # Includes test_sheets_turtle_names.py, test_sheets_generate_id.py (turtle-names, biology ID auto-generation)
        run: python -m pytest tests/integration -v --tb=short
