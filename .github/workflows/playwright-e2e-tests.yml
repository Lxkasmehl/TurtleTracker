name: Playwright E2E Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

# Pattern aligned with Playwright CI guidance: quick smoke, then parallel shards over the full suite
# (each shard runs the full project matrix from playwright.config.ts). Shared Docker + install:
# .github/actions/e2e-playwright-prepare
#
# To add capacity, extend matrix.shard to [1, 2, 3] and set PW_SHARD_TOTAL to 3.

env:
  PLAYWRIGHT_BASE_URL: http://localhost
  E2E_ADMIN_EMAIL: admin@test.com
  E2E_ADMIN_PASSWORD: testpassword123
  E2E_STAFF_EMAIL: staff@test.com
  E2E_STAFF_PASSWORD: testpassword123
  E2E_COMMUNITY_EMAIL: community@test.com
  E2E_COMMUNITY_PASSWORD: testpassword123
  PW_SHARD_TOTAL: 2

jobs:
  e2e-smoke:
    timeout-minutes: 90
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Linux Docker launcher script
        run: |
          bash -n scripts/docker-up.sh
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck scripts/docker-up.sh

      - uses: ./.github/actions/e2e-playwright-prepare

      - name: Run Playwright (smoke)
        working-directory: ./frontend
        run: >-
          npx playwright test
          tests/e2e/auth.spec.ts
          tests/e2e/navigation.spec.ts
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-smoke
          path: frontend/playwright-report/
          retention-days: 14
          if-no-files-found: ignore

  e2e-shard:
    needs: e2e-smoke
    timeout-minutes: 150
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/e2e-playwright-prepare
      - name: Run Playwright (shard ${{ matrix.shard }}/${{ env.PW_SHARD_TOTAL }})
        working-directory: ./frontend
        run: npx playwright test tests/e2e --shard=${{ matrix.shard }}/${{ env.PW_SHARD_TOTAL }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: frontend/playwright-report/
          retention-days: 30
          if-no-files-found: ignore

  e2e-success:
    name: E2E (all required jobs passed)
    needs: [e2e-smoke, e2e-shard]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Enforce green smoke + shards
        run: |
          if [ "${{ needs.e2e-smoke.result }}" != "success" ]; then
            echo "e2e-smoke did not succeed (${{ needs.e2e-smoke.result }})"
            exit 1
          fi
          if [ "${{ needs.e2e-shard.result }}" != "success" ]; then
            echo "e2e-shard did not succeed (${{ needs.e2e-shard.result }})"
            exit 1
          fi
          echo "Playwright smoke and all shards passed."
